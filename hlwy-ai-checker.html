<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI模型识别器 - Model Fingerprinting Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 15px 30px;
            background: none;
            border: none;
            font-size: 1.1em;
            cursor: pointer;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-stop {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            margin-left: 12px;
        }

        .btn-stop:hover {
            box-shadow: 0 10px 20px rgba(231, 76, 60, 0.4);
        }

        .btn-group {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }

        .progress-bar.show {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        /* ===== 错误日志面板 ===== */
        .error-log {
            margin-top: 15px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #f5c6cb;
            background: #fff;
            display: none;
            animation: errorSlideIn 0.3s ease-out;
        }

        @keyframes errorSlideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .error-log.show {
            display: block;
        }

        .error-log-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #f8d7da;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .error-log-header:hover {
            background: #f1c1c6;
        }

        .error-icon {
            font-size: 1.3em;
            flex-shrink: 0;
        }

        .error-summary {
            flex: 1;
            font-size: 0.95em;
            color: #721c24;
            font-weight: 600;
        }

        .error-toggle-arrow {
            color: #721c24;
            transition: transform 0.2s;
            font-size: 0.9em;
            flex-shrink: 0;
        }

        .error-toggle-arrow.expanded {
            transform: rotate(180deg);
        }

        .error-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: #fff5f5;
        }

        .error-details.expanded {
            max-height: 300px;
            overflow-y: auto;
        }

        .error-details ul {
            list-style: none;
            padding: 8px 16px;
        }

        .error-details li {
            padding: 8px 10px;
            border-bottom: 1px solid #fde2e4;
            font-size: 0.88em;
            color: #555;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .error-details li:last-child {
            border-bottom: none;
        }

        .error-details .err-time {
            color: #999;
            font-size: 0.85em;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .error-details .err-msg {
            flex: 1;
            word-break: break-word;
        }

        .error-details .err-badge {
            display: inline-block;
            padding: 1px 7px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: 600;
            flex-shrink: 0;
        }

        .err-badge.network   { background: #ffe0b2; color: #e65100; }
        .err-badge.auth      { background: #ffcdd2; color: #b71c1c; }
        .err-badge.ratelimit { background: #fff9c4; color: #f57f17; }
        .err-badge.server    { background: #e1bee7; color: #6a1b9a; }
        .err-badge.parse     { background: #b3e5fc; color: #01579b; }
        .err-badge.other     { background: #e0e0e0; color: #424242; }

        /* 连续失败大警告 */
        .early-fail-warning {
            margin-top: 12px;
            padding: 14px 18px;
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            border: 1px solid #ffb74d;
            border-left: 5px solid #ff9800;
            border-radius: 8px;
            display: none;
            animation: warnPulse 0.4s ease-out;
        }

        @keyframes warnPulse {
            0%   { transform: scale(0.97); }
            50%  { transform: scale(1.01); }
            100% { transform: scale(1); }
        }

        .early-fail-warning.show {
            display: block;
        }

        .early-fail-warning .warn-title {
            font-weight: 700;
            color: #e65100;
            margin-bottom: 6px;
            font-size: 1em;
        }

        .early-fail-warning .warn-body {
            color: #bf360c;
            font-size: 0.92em;
            line-height: 1.5;
        }

        .early-fail-warning .warn-suggestion {
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.7);
            border-radius: 6px;
            font-size: 0.88em;
            color: #555;
        }

        .early-fail-warning .warn-suggestion code {
            background: #f5f5f5;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 0.95em;
        }

        /* ===== 图表容器固定高度 ===== */
        .chart-container {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 400px;
            max-height: 400px;
            overflow: hidden;
        }

        .chart-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
        }

        .baseline-list {
            margin-top: 20px;
        }

        .baseline-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .baseline-item .name {
            font-weight: 600;
            color: #333;
        }

        .baseline-item .stats {
            color: #666;
            font-size: 0.9em;
        }

        .baseline-item .actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 0.9em;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-small:hover {
            background: #5a6268;
        }

        .btn-small.danger {
            background: #dc3545;
        }

        .btn-small.danger:hover {
            background: #c82333;
        }

        .result-card {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-top: 20px;
        }

        .result-card h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .match-item {
            padding: 12px;
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .match-item .model-name {
            font-weight: 600;
            font-size: 1.1em;
            color: #667eea;
        }

        .match-item .similarity {
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <!-- 检测是否直接打开 HTML 文件（而非通过后端服务） -->
    <script>
        if (window.location.protocol === 'file:') {
            // 立即隐藏页面，防止正常内容闪烁
            document.documentElement.style.visibility = 'hidden';
            document.addEventListener('DOMContentLoaded', function() {
                document.body.innerHTML = `
                <div style="
                    display: flex; align-items: center; justify-content: center;
                    min-height: 100vh; padding: 20px;
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
                ">
                    <div style="
                        background: white; border-radius: 20px; padding: 50px 40px;
                        box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 600px;
                        text-align: center;
                    ">
                        <div style="font-size: 4em; margin-bottom: 20px;">🚫</div>
                        <h1 style="color: #e74c3c; margin-bottom: 15px; font-size: 1.8em;">无法直接打开此文件</h1>
                        <p style="color: #555; font-size: 1.1em; line-height: 1.8; margin-bottom: 25px;">
                            本工具需要通过后端服务器运行，直接打开 HTML 文件无法正常使用。
                        </p>
                        <div style="
                            background: #f8f9fa; border-radius: 12px; padding: 20px;
                            text-align: left; border-left: 4px solid #667eea;
                        ">
                            <p style="font-weight: 700; color: #333; margin-bottom: 12px;">✅ 正确启动方式：</p>
                            <code style="
                                display: block; background: #2d2d2d; color: #f8f8f2;
                                padding: 12px 16px; border-radius: 8px; font-size: 1.05em;
                            ">python start.py</code>
                            <p style="color: #888; font-size: 0.9em; margin-top: 12px;">
                                在本项目目录下运行上述命令，浏览器会自动打开。
                            </p>
                        </div>
                    </div>
                </div>`;
                document.documentElement.style.visibility = 'visible';
            });
        }
    </script>

    <div class="container">
        <div class="header">
            <h1>🎯 AI模型识别器</h1>
            <p>通过随机数生成模式识别和区分不同的AI模型</p>
            <p style="font-size: 0.85em; opacity: 0.7; margin-top: 5px;">v2.1.0</p>
        </div>

        <div class="content">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('calibrate')">📊 标定基准</button>
                <button class="tab" onclick="switchTab('test')">🔍 测试识别</button>
                <button class="tab" onclick="switchTab('baselines')">💾 基准管理</button>
            </div>

            <!-- 标定基准 Tab -->
            <div id="calibrate" class="tab-content active">
                <h2>标定新模型基准</h2>
                <p style="color: #666; margin-bottom: 20px;">配置API并运行测试，建立模型的随机数分布基准</p>

                <div class="form-group">
                    <label>API 类型</label>
                    <select id="calib-api-type" onchange="updateCalibApiFields()">
                        <option value="openai">OpenAI 兼容格式</option>
                        <option value="anthropic">Anthropic Claude API</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Base URL</label>
                        <input type="text" id="calib-base-url" placeholder="https://api.openai.com/v1">
                    </div>
                    <div class="form-group">
                        <label>API Key</label>
                        <input type="password" id="calib-api-key" placeholder="sk-...">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>模型名称</label>
                        <input type="text" id="calib-model-name" placeholder="gpt-4">
                    </div>
                    <div class="form-group">
                        <label>请求头伪装</label>
                        <select id="calib-header-preset">
                            <option value="default">默认</option>
                            <option value="claude-code">Claude Code</option>
                            <option value="codex">Codex CLI</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>测试次数 (50-500)</label>
                        <input type="number" id="calib-iterations" value="200" min="50" max="500">
                    </div>
                    <div class="form-group">
                        <label>并发数 (1-50)</label>
                        <input type="number" id="calib-concurrency" value="1" min="1" max="50">
                    </div>
                </div>

                <div class="form-group">
                    <label>基准名称（用于保存和识别）</label>
                    <input type="text" id="calib-baseline-name" placeholder="例如: GPT-4-Turbo-2024">
                </div>

                <div class="btn-group">
                    <button class="btn" onclick="startCalibration()" id="calib-btn">🚀 开始标定</button>
                    <button class="btn btn-stop" id="calib-stop-btn" onclick="abortCalibration()" style="display: none;">⏹ 中止</button>
                </div>

                <div class="progress-bar" id="calib-progress-bar">
                    <div class="progress-fill" id="calib-progress-fill">0%</div>
                </div>

                <div class="status" id="calib-status"></div>

                <!-- 错误日志面板 -->
                <div class="error-log" id="calib-error-log">
                    <div class="error-log-header" onclick="toggleErrorDetails('calib')">
                        <span class="error-icon">⚠️</span>
                        <span class="error-summary" id="calib-error-summary">发生了一些错误</span>
                        <span class="error-toggle-arrow" id="calib-error-arrow">▼</span>
                    </div>
                    <div class="error-details" id="calib-error-details">
                        <ul id="calib-error-list"></ul>
                    </div>
                </div>

                <!-- 连续失败大警告 -->
                <div class="early-fail-warning" id="calib-early-warning">
                    <div class="warn-title">🚨 连续请求失败</div>
                    <div class="warn-body" id="calib-early-warning-body"></div>
                    <div class="warn-suggestion" id="calib-early-warning-suggestion"></div>
                </div>

                <div class="chart-container" id="calib-chart-container" style="display: none;">
                    <h3>分布图表</h3>
                    <div class="chart-wrapper">
                        <canvas id="calib-chart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 测试识别 Tab -->
            <div id="test" class="tab-content">
                <h2>测试未知模型</h2>
                <p style="color: #666; margin-bottom: 20px;">配置待测模型API，系统将匹配最相似的基准模型</p>

                <div class="form-group">
                    <label>API 类型</label>
                    <select id="test-api-type" onchange="updateTestApiFields()">
                        <option value="openai">OpenAI 兼容格式</option>
                        <option value="anthropic">Anthropic Claude API</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Base URL</label>
                        <input type="text" id="test-base-url" placeholder="https://api.openai.com/v1">
                    </div>
                    <div class="form-group">
                        <label>API Key</label>
                        <input type="password" id="test-api-key" placeholder="sk-...">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>模型名称</label>
                        <input type="text" id="test-model-name" placeholder="unknown-model">
                    </div>
                    <div class="form-group">
                        <label>请求头伪装</label>
                        <select id="test-header-preset">
                            <option value="default">默认</option>
                            <option value="claude-code">Claude Code</option>
                            <option value="codex">Codex CLI</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>测试次数 (50-500)</label>
                        <input type="number" id="test-iterations" value="200" min="50" max="500">
                    </div>
                    <div class="form-group">
                        <label>并发数 (1-50)</label>
                        <input type="number" id="test-concurrency" value="1" min="1" max="50">
                    </div>
                </div>

                <div class="btn-group">
                    <button class="btn" onclick="startTest()" id="test-btn">🔍 开始测试</button>
                    <button class="btn btn-stop" id="test-stop-btn" onclick="abortTest()" style="display: none;">⏹ 中止</button>
                </div>

                <div class="progress-bar" id="test-progress-bar">
                    <div class="progress-fill" id="test-progress-fill">0%</div>
                </div>

                <div class="status" id="test-status"></div>

                <!-- 错误日志面板 -->
                <div class="error-log" id="test-error-log">
                    <div class="error-log-header" onclick="toggleErrorDetails('test')">
                        <span class="error-icon">⚠️</span>
                        <span class="error-summary" id="test-error-summary">发生了一些错误</span>
                        <span class="error-toggle-arrow" id="test-error-arrow">▼</span>
                    </div>
                    <div class="error-details" id="test-error-details">
                        <ul id="test-error-list"></ul>
                    </div>
                </div>

                <!-- 连续失败大警告 -->
                <div class="early-fail-warning" id="test-early-warning">
                    <div class="warn-title">🚨 连续请求失败</div>
                    <div class="warn-body" id="test-early-warning-body"></div>
                    <div class="warn-suggestion" id="test-early-warning-suggestion"></div>
                </div>

                <div class="result-card" id="test-results" style="display: none;">
                    <h3>识别结果</h3>
                    <div id="test-matches"></div>
                </div>

                <div class="chart-container" id="test-chart-container" style="display: none;">
                    <h3>分布对比</h3>
                    <div class="chart-wrapper">
                        <canvas id="test-chart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 基准管理 Tab -->
            <div id="baselines" class="tab-content">
                <h2>已保存的基准模型</h2>
                <p style="color: #666; margin-bottom: 20px;">管理和查看已标定的模型基准数据</p>

                <div class="baseline-list" id="baseline-list">
                    <p style="text-align: center; color: #999; padding: 40px;">暂无基准数据，请先进行标定</p>
                </div>

                <button class="btn btn-secondary" onclick="exportBaselines()" style="margin-top: 20px;">📥 导出所有基准</button>
                <button class="btn btn-secondary" onclick="importBaselines()" style="margin-top: 20px; margin-left: 10px;">📤 导入基准</button>
                <input type="file" id="import-file" style="display: none;" accept=".json" onchange="handleImport()">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        /* ========================================
         *  全局状态
         * ======================================== */
        let baselines = JSON.parse(localStorage.getItem('modelBaselines') || '[]');
        let currentCalibChart = null;
        let currentTestChart  = null;

        // 中止标志
        let calibRunning = false;
        let testRunning  = false;

        /* ========================================
         *  UI 辅助
         * ======================================== */
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
            if (tabName === 'baselines') renderBaselines();
        }

        function updateCalibApiFields() {
            const type = document.getElementById('calib-api-type').value;
            document.getElementById('calib-base-url').placeholder =
                type === 'openai' ? 'https://api.openai.com/v1' : 'https://api.anthropic.com';
        }

        function updateTestApiFields() {
            const type = document.getElementById('test-api-type').value;
            document.getElementById('test-base-url').placeholder =

        /* ========================================
         *  错误分类与友好提示
         * ======================================== */
        function classifyError(error) {
            const msg = error.message || String(error);

            // 网络 / CORS
            if (msg.includes('Failed to fetch') || msg.includes('NetworkError') || msg.includes('net::')) {
                return {
                    type: 'network', badge: '网络',
                    friendly: '无法连接到API服务器',
                    suggestion: '请检查 Base URL 是否正确、网络是否通畅。如果是跨域问题 (CORS)，可能需要通过后端代理访问。'
                };
            }

            // HTTP 状态码
            const statusMatch = msg.match(/API错误:\s*(\d{3})/);
            if (statusMatch) {
                const code = parseInt(statusMatch[1]);

                if (code === 401) return {
                    type: 'auth', badge: '认证',
                    friendly: 'API Key 无效或已过期 (401)',
                    suggestion: '请检查 API Key 是否正确、是否已过期或被撤销。'
                };

                if (code === 403) return {
                    type: 'auth', badge: '权限',
                    friendly: '没有权限访问该模型 (403)',
                    suggestion: '您的 API Key 可能没有该模型的访问权限，或该模型尚未对您开放。'
                };

                if (code === 404) return {
                    type: 'other', badge: '404',
                    friendly: 'API 端点或模型不存在 (404)',
                    suggestion: '请检查 Base URL 和模型名称是否正确。常见问题：URL 末尾多了 "/" 或缺少路径前缀。'
                };

                if (code === 429) return {
                    type: 'ratelimit', badge: '限频',
                    friendly: '请求过于频繁，触发速率限制 (429)',
                    suggestion: '请稍后重试，或降低测试次数。部分服务商对免费额度有严格的 RPM 限制。'
                };

                if (code === 400) {
                    // Check for model-specific errors
                    if (msg.includes('model')) return {
                        type: 'other', badge: '参数',
                        friendly: '请求参数错误 — 模型名称可能不正确 (400)',
                        suggestion: '请确认模型名称拼写正确（区分大小写），例如 "gpt-4o" 而非 "GPT4o"。'
                    };
                    return {
                        type: 'other', badge: '参数',
                        friendly: '请求参数错误 (400)',
                        suggestion: '请检查 API 类型是否与 Base URL 匹配（OpenAI 格式 vs Anthropic 格式）。'
                    };
                }

                if (code >= 500) return {
                    type: 'server', badge: '服务端',
                    friendly: `API 返回错误 (${code})`,
                    suggestion: '请检查配置是否正确：API Key、Base URL、模型名称是否填写无误。如果配置确认无误，可能是服务端暂时不可用，请稍后重试。'
                };

                return {
                    type: 'other', badge: code.toString(),
                    friendly: `API 返回错误 (${code})`,
                    suggestion: '请查看下方错误详情获取更多信息。'
                };
            }

            // JSON 解析
            if (msg.includes('JSON') || msg.includes('Unexpected token')) {
                return {
                    type: 'parse', badge: '解析',
                    friendly: '返回数据格式异常',
                    suggestion: 'API 返回的不是预期的 JSON 格式。Base URL 可能指向了错误的地址（如网页而非 API 端点）。'
                };
            }

            // 超时
            if (msg.includes('timeout') || msg.includes('Timeout') || msg.includes('AbortError')) {
                return {
                    type: 'network', badge: '超时',
                    friendly: '请求超时',
                    suggestion: '服务器响应时间过长，请检查网络或稍后重试。'
                };
            }

            // 兜底
            return {
                type: 'other', badge: '错误',
                friendly: msg.length > 80 ? msg.substring(0, 80) + '…' : msg,
                suggestion: '请检查配置后重试。'
            };
        }

        /* ========================================
         *  错误日志面板 管理
         * ======================================== */
        // 每个面板的错误计数器
        const errorState = {
            calib: { count: 0, consecutive: 0, maxConsecutive: 0, list: [], shownWarning: false },
            test:  { count: 0, consecutive: 0, maxConsecutive: 0, list: [], shownWarning: false }
        };

        function resetErrorState(prefix) {
            errorState[prefix] = { count: 0, consecutive: 0, maxConsecutive: 0, list: [], shownWarning: false };
            const logEl = document.getElementById(`${prefix}-error-log`);
            logEl.classList.remove('show');
            document.getElementById(`${prefix}-error-details`).classList.remove('expanded');
            document.getElementById(`${prefix}-error-arrow`).classList.remove('expanded');
            document.getElementById(`${prefix}-error-list`).innerHTML = '';
            document.getElementById(`${prefix}-early-warning`).classList.remove('show');
        }

        function addError(prefix, error) {
            const state = errorState[prefix];
            const classified = classifyError(error);
            state.count++;
            state.consecutive++;
            if (state.consecutive > state.maxConsecutive) state.maxConsecutive = state.consecutive;

            // 记录（最多保留最近 50 条）
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            state.list.push({ time: timeStr, classified, raw: error.message || String(error) });
            if (state.list.length > 50) state.list.shift();

            // 更新面板
            const logEl = document.getElementById(`${prefix}-error-log`);
            logEl.classList.add('show');

            const summary = document.getElementById(`${prefix}-error-summary`);
            summary.textContent = `已发生 ${state.count} 个错误 — 最近: ${classified.friendly}`;

            // 添加列表项
            const ul = document.getElementById(`${prefix}-error-list`);
            const li = document.createElement('li');
            li.innerHTML = `
                <span class="err-time">${timeStr}</span>
                <span class="err-badge ${classified.type}">${classified.badge}</span>
                <span class="err-msg">${classified.friendly}</span>`;
            ul.prepend(li);   // 最新的在上面

            // 超过 50 条移除旧的
            while (ul.children.length > 50) { ul.removeChild(ul.lastElementChild); }

            // 如果连续失败 >= 5 且尚未警告过，显示大警告
            if (state.consecutive >= 5 && !state.shownWarning) {
                state.shownWarning = true;
                showEarlyWarning(prefix, classified);
            }
        }

        function clearConsecutiveErrors(prefix) {
            errorState[prefix].consecutive = 0;
        }

        function showEarlyWarning(prefix, classified) {
            const warning = document.getElementById(`${prefix}-early-warning`);
            const body = document.getElementById(`${prefix}-early-warning-body`);
            const sugg = document.getElementById(`${prefix}-early-warning-suggestion`);

            body.textContent = `前面的请求已连续失败 ${errorState[prefix].consecutive} 次，最后的错误类型为「${classified.friendly}」。建议检查配置后重试，或点击中止按钮停止当前任务。`;
            sugg.innerHTML = `<strong>💡 建议：</strong>${classified.suggestion}`;
            warning.classList.add('show');
        }

        function toggleErrorDetails(prefix) {
            const details = document.getElementById(`${prefix}-error-details`);
            const arrow   = document.getElementById(`${prefix}-error-arrow`);
            details.classList.toggle('expanded');
            arrow.classList.toggle('expanded');
        }

        /* ========================================
         *  中止功能

        function abortCalibration() {
            calibRunning = false;

            testRunning = false;

        /* ========================================
         *  API 调用
         * ======================================== */
        async function callOpenAI(baseUrl, apiKey, model, headerPreset) {
            const headers = {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`,
                'X-Target-Base-URL': baseUrl,
                'X-Header-Preset': headerPreset || 'default'
            };
            const response = await fetch('/chat/completions', {
                method: 'POST',
                headers,
                body: JSON.stringify({
                    model: model,
                    messages: [{ role: 'user', content: '请从1到355之间随机选择一个数字，只输出这个数字，不要有任何其他内容。' }],
                    temperature: 1.0,
                    max_tokens: 10
                })
            });
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`API错误: ${response.status} - ${errorText}`);
            }
            const data = await response.json();
            return data.choices[0].message.content.trim();
        }

        async function callAnthropic(baseUrl, apiKey, model, headerPreset) {
            const headers = {
                'Content-Type': 'application/json',
                'x-api-key': apiKey,
                'anthropic-version': '2023-06-01',
                'X-Target-Base-URL': baseUrl,
                'X-Header-Preset': headerPreset || 'default'
            };
            const response = await fetch('/messages', {
                method: 'POST',
                headers,
                body: JSON.stringify({
                    model: model,
                    max_tokens: 10,
                    messages: [{ role: 'user', content: '请从1到355之间随机选择一个数字，只输出这个数字，不要有任何其他内容。' }],
                    temperature: 1.0
                })
            });
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`API错误: ${response.status} - ${errorText}`);
            }
            const data = await response.json();
            return data.content[0].text.trim();
        }

        function extractNumber(text) {
            const match = text.match(/\d+/);
            if (match) {
                const num = parseInt(match[0]);
                if (num >= 1 && num <= 355) return num;
            }
            return null;
        }

        async function getRandomNumber(apiType, baseUrl, apiKey, model, headerPreset) {
            let response;
            if (apiType === 'openai') {
                response = await callOpenAI(baseUrl, apiKey, model, headerPreset);
            } else {
                response = await callAnthropic(baseUrl, apiKey, model, headerPreset);
            }
            return extractNumber(response);
        }

        /* ========================================
         *  并发控制
         * ======================================== */
        async function runWithConcurrency(totalCount, concurrency, isRunning, taskFn, onProgress) {
            let completed = 0;
            let nextIndex = 0;

            async function worker() {
                while (isRunning()) {
                    const currentIndex = nextIndex++;
                    if (currentIndex >= totalCount) break;
                    const success = await taskFn(currentIndex);
                    if (success !== false) {
                        completed++;
                        onProgress(completed, totalCount);
                    }
                }
            }

            const workerCount = Math.min(concurrency, totalCount);
            const workers = [];
            for (let i = 0; i < workerCount; i++) {
                workers.push(worker());
            }
            await Promise.all(workers);
        }

        /* ========================================

        async function startCalibration() {

            if (!baseUrl || !apiKey || !model || !baselineName) {
                showStatus('calib-status', '请填写所有必填字段', 'error');
                return;
            }
            if (iterations < 50 || iterations > 500) {
                showStatus('calib-status', '测试次数必须在50-500之间', 'error');

            // 重置 UI
            const btn     = document.getElementById('calib-btn');

            calibRunning = true;

            const results = [];
            let successCount = 0;
            let errorCount   = 0;

            await runWithConcurrency(
                iterations,
                concurrency,
                () => calibRunning,
                async (i) => {
                    if (!calibRunning) return false;
                    try {
                        const num = await getRandomNumber(apiType, baseUrl, apiKey, model, headerPreset);
                        if (num !== null) {
                            results.push(num);
                            successCount++;
                            clearConsecutiveErrors('calib');
                        } else {
                            errorCount++;
                            addError('calib', new Error('返回内容无法解析为 1-355 的数字'));
                        }
                    } catch (error) {
                        errorCount++;
                        addError('calib', error);
                        console.error('请求错误:', error);
                    }
                },
                (completed, total) => {
                    updateProgress('calib-progress-bar', 'calib-progress-fill', (completed / total) * 100);
                    showStatus('calib-status', `进度: ${successCount} 成功 / ${errorCount} 失败 / ${total} 总数（并发: ${concurrency}）`, 'info');
                }
            );

            if (!calibRunning) {
                showStatus('calib-status', `⏹ 已中止。成功: ${successCount}, 失败: ${errorCount}`, 'error');
            }

            stopBtn.style.display = 'none';

            if (!calibRunning && results.length < 40) {
                // 用户中止且数据不足
                btn.disabled = false;
                btn.textContent = '🚀 开始标定';
                calibRunning = false;

            }

            calibRunning = false;

            if (results.length < 40) {
                showStatus('calib-status',

                    'error');
                btn.disabled = false;
                btn.textContent = '🚀 开始标定';
                return;
            }

            const distribution = calculateDistribution(results);
            const stats = calculateStats(results);

            const baseline = {
                name: baselineName, model, apiType,
                timestamp: new Date().toISOString(),
                iterations: results.length, distribution, stats, rawData: results
            };

            baselines.push(baseline);
            localStorage.setItem('modelBaselines', JSON.stringify(baselines));
            displayCalibrationChart(distribution, baselineName);

            if (errorCount > 0) {
                showStatus('calib-status',
                    `✅ 标定完成！成功: ${successCount}, 失败: ${errorCount}（部分请求出错，但有效数据足够建立基准）`,
                    'success');
            } else {
                showStatus('calib-status', `✅ 标定完成！${successCount} 次请求全部成功`, 'success');
            }

            btn.disabled = false;
            btn.textContent = '🚀 开始标定';
        }

        /* ========================================
         *  数学计算
         * ======================================== */
        function calculateDistribution(numbers) {
            const counts = new Array(355).fill(0);
            numbers.forEach(num => { if (num >= 1 && num <= 355) counts[num - 1]++; });
            const total = numbers.length;
            return counts.map(c => c / total);
        }

        function calculateStats(numbers) {
            const sorted = [...numbers].sort((a, b) => a - b);
            const mean = numbers.reduce((a, b) => a + b, 0) / numbers.length;
            const variance = numbers.reduce((sum, x) => sum + Math.pow(x - mean, 2), 0) / numbers.length;
            return {
                mean, median: sorted[Math.floor(sorted.length / 2)],
                stdDev: Math.sqrt(variance), min: sorted[0],
                max: sorted[sorted.length - 1], unique: new Set(numbers).size
            };
        }

        function calculateSimilarity(dist1, dist2) {
            let dotProduct = 0, norm1 = 0, norm2 = 0;
            for (let i = 0; i < dist1.length; i++) {
                dotProduct += dist1[i] * dist2[i];
                norm1 += dist1[i] * dist1[i];
                norm2 += dist2[i] * dist2[i];
            }
            const cosineSim = dotProduct / (Math.sqrt(norm1) * Math.sqrt(norm2));
            let jsDiv = 0;
            const epsilon = 1e-10;
            for (let i = 0; i < dist1.length; i++) {
                const p = dist1[i] + epsilon, q = dist2[i] + epsilon, m = (p + q) / 2;
                jsDiv += (p * Math.log(p / m) + q * Math.log(q / m)) / 2;
            }
            return { cosineSimilarity: cosineSim, jsDivergence: jsDiv, overallScore: cosineSim * Math.exp(-jsDiv) };
        }

        function matchBaselines(testDistribution, testResults) {
            const testStats = calculateStats(testResults);
            return baselines.map(baseline => {
                const similarity = calculateSimilarity(testDistribution, baseline.distribution);
                const statsDiff = {
                    meanDiff: Math.abs(testStats.mean - baseline.stats.mean),
                    stdDevDiff: Math.abs(testStats.stdDev - baseline.stats.stdDev),
                    medianDiff: Math.abs(testStats.median - baseline.stats.median)
                };
                return { baseline, similarity, statsDiff, score: similarity.overallScore };
            }).sort((a, b) => b.score - a.score);
        }

        /* ========================================
         *  图表
         * ======================================== */
        function resetCanvas(canvasId) {
            const oldCanvas = document.getElementById(canvasId);
            const wrapper = oldCanvas.parentElement;
            oldCanvas.remove();
            const newCanvas = document.createElement('canvas');
            newCanvas.id = canvasId;
            wrapper.appendChild(newCanvas);
            return newCanvas;
        }

        function displayCalibrationChart(distribution, name) {
            const container = document.getElementById('calib-chart-container');
            container.style.display = 'block';
            if (currentCalibChart) { currentCalibChart.destroy(); currentCalibChart = null; }

            const canvas = resetCanvas('calib-chart');
            const ctx = canvas.getContext('2d');
            const bucketSize = 10;
            const buckets = Math.ceil(355 / bucketSize);
            const bucketData = new Array(buckets).fill(0);
            distribution.forEach((val, idx) => { bucketData[Math.floor(idx / bucketSize)] += val; });
            const labels = [];
            for (let i = 0; i < buckets; i++) labels.push(`${i * bucketSize + 1}-${Math.min((i + 1) * bucketSize, 355)}`);

            currentCalibChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: name,
                        data: bucketData,
                        backgroundColor: 'rgba(102, 126, 234, 0.6)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, title: { display: true, text: '频率' } },
                        x: { title: { display: true, text: '数字范围' }, ticks: { maxRotation: 45, minRotation: 0, autoSkip: true, maxTicksLimit: 20 } }
                    },
                    plugins: { legend: { position: 'top' } }
                }
            });
        }

        function displayTestResults(matches, testDistribution, modelName) {
            const resultsContainer = document.getElementById('test-results');
            const matchesContainer = document.getElementById('test-matches');
            resultsContainer.style.display = 'block';
            matchesContainer.innerHTML = '';

            if (matches.length === 0) {
                matchesContainer.innerHTML = '<p style="text-align:center;color:#999;">没有找到匹配的基准</p>';
                return;
            }

            matches.slice(0, 3).forEach((match, index) => {
                const item = document.createElement('div');
                item.className = 'match-item';
                item.innerHTML = `
                    <div class="model-name">#${index + 1} ${match.baseline.name}</div>
                    <div class="similarity">
                        <strong>综合匹配度:</strong> ${(match.score * 100).toFixed(2)}%<br>
                        <strong>余弦相似度:</strong> ${(match.similarity.cosineSimilarity * 100).toFixed(2)}%<br>
                        <strong>JS散度:</strong> ${match.similarity.jsDivergence.toFixed(4)}<br>
                        <strong>均值差异:</strong> ${match.statsDiff.meanDiff.toFixed(2)} |
                        <strong>标准差差异:</strong> ${match.statsDiff.stdDevDiff.toFixed(2)}
                    </div>`;
                matchesContainer.appendChild(item);
            });

            displayComparisonChart(testDistribution, matches[0].baseline.distribution, modelName, matches[0].baseline.name);
        }

        function displayComparisonChart(testDist, baselineDist, testName, baselineName) {
            const container = document.getElementById('test-chart-container');
            container.style.display = 'block';
            if (currentTestChart) { currentTestChart.destroy(); currentTestChart = null; }

            const canvas = resetCanvas('test-chart');
            const ctx = canvas.getContext('2d');
            const bucketSize = 10;
            const buckets = Math.ceil(355 / bucketSize);
            const testBuckets     = new Array(buckets).fill(0);
            const baselineBuckets = new Array(buckets).fill(0);
            testDist.forEach((val, idx) => { testBuckets[Math.floor(idx / bucketSize)] += val; });
            baselineDist.forEach((val, idx) => { baselineBuckets[Math.floor(idx / bucketSize)] += val; });
            const labels = [];
            for (let i = 0; i < buckets; i++) labels.push(`${i * bucketSize + 1}-${Math.min((i + 1) * bucketSize, 355)}`);

            currentTestChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [
                        { label: `测试: ${testName}`, data: testBuckets, backgroundColor: 'rgba(102, 126, 234, 0.6)', borderColor: 'rgba(102, 126, 234, 1)', borderWidth: 1 },
                        { label: `基准: ${baselineName}`, data: baselineBuckets, backgroundColor: 'rgba(118, 75, 162, 0.6)', borderColor: 'rgba(118, 75, 162, 1)', borderWidth: 1 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, title: { display: true, text: '频率' } },
                        x: { title: { display: true, text: '数字范围' }, ticks: { maxRotation: 45, minRotation: 0, autoSkip: true, maxTicksLimit: 20 } }
                    },
                    plugins: { legend: { position: 'top' } }
                }
            });
        }

        /* ========================================
         *  基准管理
         * ======================================== */
        function renderBaselines() {
            const container = document.getElementById('baseline-list');
            if (baselines.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#999;padding:40px;">暂无基准数据，请先进行标定</p>';
                return;
            }
            container.innerHTML = '';
            baselines.forEach((baseline, index) => {
                const item = document.createElement('div');
                item.className = 'baseline-item';
                item.innerHTML = `
                    <div>
                        <div class="name">${baseline.name}</div>
                        <div class="stats">
                            模型: ${baseline.model} | 样本数: ${baseline.iterations} | 创建: ${new Date(baseline.timestamp).toLocaleString('zh-CN')}<br>
                            均值: ${baseline.stats.mean.toFixed(2)} | 标准差: ${baseline.stats.stdDev.toFixed(2)} | 唯一值: ${baseline.stats.unique}
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn-small" onclick="viewBaseline(${index})">查看</button>
                        <button class="btn-small danger" onclick="deleteBaseline(${index})">删除</button>
                    </div>`;
                container.appendChild(item);
            });
        }

        function viewBaseline(index) {
            const b = baselines[index];
            alert(`基准: ${b.name}\n模型: ${b.model}\nAPI: ${b.apiType}\n样本: ${b.iterations}\n` +
                  `时间: ${new Date(b.timestamp).toLocaleString('zh-CN')}\n\n` +
                  `均值: ${b.stats.mean.toFixed(2)}\n中位数: ${b.stats.median}\n标准差: ${b.stats.stdDev.toFixed(2)}\n` +
                  `范围: ${b.stats.min}-${b.stats.max}\n唯一值: ${b.stats.unique}`);
        }

        function deleteBaseline(index) {
            if (confirm(`确定删除 "${baselines[index].name}"？`)) {
                baselines.splice(index, 1);
                localStorage.setItem('modelBaselines', JSON.stringify(baselines));
                renderBaselines();
            }
        }

        function exportBaselines() {
            if (baselines.length === 0) { alert('没有可导出的基准数据'); return; }
            const blob = new Blob([JSON.stringify(baselines, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `model-baselines-${Date.now()}.json`;
            a.click();
        }

        function importBaselines() { document.getElementById('import-file').click(); }

        function handleImport() {
            const file = document.getElementById('import-file').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!Array.isArray(imported)) { alert('无效的基准数据格式'); return; }
                    const valid = imported.filter(b =>
                        b && typeof b.name === 'string' &&
                        typeof b.model === 'string' &&
                        Array.isArray(b.distribution) && b.distribution.length === 355 &&
                        b.stats && typeof b.stats.mean === 'number' &&
                        typeof b.stats.stdDev === 'number' &&
                        typeof b.stats.median === 'number'
                    );
                    if (valid.length === 0) {
                        alert('导入的数据中没有有效的基准记录，请检查文件格式');
                        return;
                    }
                    baselines = [...baselines, ...valid];
                    localStorage.setItem('modelBaselines', JSON.stringify(baselines));
                    renderBaselines();
                    if (valid.length < imported.length) {
                        alert(`成功导入 ${valid.length} 个基准（${imported.length - valid.length} 个因格式不完整被跳过）`);
                    } else {
                        alert(`成功导入 ${valid.length} 个基准`);
                    }
                } catch (error) { alert('导入失败: ' + error.message); }
            };
            reader.readAsText(file);
            document.getElementById('import-file').value = '';
        }

        /* ========================================
         *  初始化
         * ======================================== */
        window.addEventListener('DOMContentLoaded', () => {
            console.log('AI模型识别器已加载');
            console.log(`当前已保存 ${baselines.length} 个基准模型`);
        });
    </script>
</body>
</html>
